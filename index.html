<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCP Community</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ENCABEZADO -->
    <header>
        <h1>PCP Community</h1>

        <nav>
            <a href="#ranking">Ranking</a>
            <a href="#top3">Top 3</a>
            <a href="#estadisticas">Estadísticas</a>
            <a href="#salon">Salón de la Fama</a>
        </nav>
    </header>

    <!-- RANKING -->
    <section id="ranking">
        <h2>🏆 Ranking</h2>

        <input type="text" placeholder="Buscar jugador...">

        <table>
            <thead>
                <tr>
                    <th>Posición</th>
                    <th>Jugador</th>
                    <th>Puntos</th>
                </tr>
            </thead>

            <tbody>
                <!-- Aquí aparecerán los jugadores -->
            </tbody>
        </table>
    </section>

    <!-- TOP 3 -->
    <section id="top3">
        <h2>🥇 Top 3</h2>

        <div id="primerLugar"></div>
        <div id="segundoLugar"></div>
        <div id="tercerLugar"></div>
    </section>

    <!-- ESTADÍSTICAS -->
    <section id="estadisticas">
        <h2>📊 Estadísticas</h2>

        <div id="estadisticasContenido"></div>
    </section>

    <!-- SALÓN DE LA FAMA -->
    <section id="salon">
        <h2>🌟 Salón de la Fama</h2>

        <div id="salonContenido"></div>
    </section>

    <script src="script.js"></script>

</body>

</html>
